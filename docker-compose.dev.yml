services:
  postgres:
    image: postgres:16
    container_name: prospectbdapprovaldesk-postgres
    environment:
      POSTGRES_DB: ProspectbdApprovalDeskDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - prospectbdapprovaldesk_pgdata:/var/lib/postgresql/data
    networks:
      - traefik-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ProspectbdApprovalDeskDb"]
      interval: 5s
      timeout: 5s
      retries: 5

  approval-desk-backend:
    ports:
      - "5096:8080"
    depends_on:
      postgres:
        condition: service_healthy

    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ProspectbdApprovalDeskDb;Username=postgres;Password=postgres

  approval-desk-frontend:
    ports:
      - "5173:80"
    depends_on:
      - approval-desk-backend

